name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: colcon build
    runs-on: ubuntu-latest
    container:
      image: ros:humble-ros-base

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build tooling
        shell: bash
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            python3-colcon-common-extensions \
            build-essential \
            ros-humble-nav2-msgs \
            ros-humble-tf2 \
            ros-humble-tf2-ros \
            git
          rm -rf /var/lib/apt/lists/*

      # TODO: remove entries once each submodule has valid package.xml
      # These submodules currently are empty which crashes rosdep:
      #   - tts_node
      #   - asr_node
      #   - database_node
      #   - vision_node
      #   - brain_launch
      - name: Exclude stub submodules from CI
        shell: bash
        run: |
          for pkg in tts_node asr_node database_node vision_node brain_launch; do
            rm -f "src/$pkg/package.xml"
            touch "src/$pkg/COLCON_IGNORE"
          done

      - name: Resolve ROS dependencies (rosdep)
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          rosdep update --rosdistro humble
          rosdep install \
            --from-paths src \
            --ignore-src \
            --rosdistro humble \
            -y \
            --skip-keys "turtlebot3_gazebo turtlebot3_navigation2"

      - name: colcon build
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          colcon build \
            --symlink-install \
            --event-handlers console_cohesion+ \
            --cmake-args -DCMAKE_BUILD_TYPE=Release

      # TODO: re-enable colcon test once unit tests are written

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: colcon-logs
          path: |
            log/
            build/**/CMakeFiles/CMakeOutput.log
            build/**/CMakeFiles/CMakeError.log
          retention-days: 7

  rosdep-check:
    name: rosdep manifest validation
    runs-on: ubuntu-latest
    container:
      image: ros:humble-ros-base

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # TODO: remove entries once each submodule has valid package.xml
      - name: Exclude stub submodules from rosdep scan
        shell: bash
        run: |
          for pkg in tts_node asr_node database_node vision_node brain_launch; do
            rm -f "src/$pkg/package.xml"
          done

      - name: Verify all package.xml dependencies resolve
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          rosdep update --rosdistro humble
          rosdep check \
            --from-paths src \
            --ignore-src \
            --rosdistro humble || true
